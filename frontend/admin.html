<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3e2723">
  <title>Admin — OV R&G Club</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="app-container" style="padding-bottom:1rem">
    <header class="page-header">
      <span class="logo">OV R&G Admin</span>
      <button class="btn btn-outline" style="padding:0.4rem 0.8rem;font-size:0.8rem;min-height:auto" id="admin-logout-btn" onclick="adminLogout()">Logout</button>
    </header>

    <!-- Login -->
    <div id="admin-login">
      <div class="login-logo mt-3">
        <h2>Admin Login</h2>
      </div>
      <form id="admin-login-form" style="margin-top:1rem">
        <div class="form-group">
          <label for="admin-user">Username</label>
          <input type="text" id="admin-user" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="admin-pass">Password</label>
          <input type="password" id="admin-pass" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-gold btn-block">Sign In</button>
        <div id="admin-error" class="text-red text-center text-sm mt-2 hidden"></div>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="admin-dashboard" class="hidden">
      <div class="tabs mt-2">
        <button class="tab active" data-tab="activity">Activity</button>
        <button class="tab" data-tab="ranges">Ranges</button>
        <button class="tab" data-tab="hazards">Hazards</button>
        <button class="tab" data-tab="export">Export</button>
      </div>
      <div id="tab-content"></div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="/assets/admin.js"></script>
</body>
</html>
